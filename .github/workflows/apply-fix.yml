name: Apply dart fix

# One-shot dispatch to resolve analyzer findings with `dart fix --apply`,
# remove a known unreachable default case in lib/src/weekday_row.dart, and
# reformat. Useful after upgrading flutter_lints / Flutter / Dart versions
# when new lints surface. Delete this file once it has served its purpose.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-fix
  cancel-in-progress: false

jobs:
  fix:
    name: Fix and commit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.DEPENDENCY_UPDATE_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Print versions
        run: |
          flutter --version
          dart --version

      - name: Install deps (root)
        run: flutter pub get

      - name: Install deps (example)
        working-directory: example
        run: flutter pub get

      - name: Apply dart fix (root)
        run: dart fix --apply

      - name: Apply dart fix (example)
        working-directory: example
        run: dart fix --apply

      - name: Remove unreachable default case in weekday_row.dart
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('lib/src/weekday_row.dart')
          s = p.read_text()
          marker = "        case WeekdayFormat.standaloneNarrow:\n          weekDay = localeDate.dateSymbols.STANDALONENARROWWEEKDAYS[i];\n          break;\n        default:\n          weekDay = localeDate.dateSymbols.STANDALONEWEEKDAYS[i];\n          break;\n"
          replacement = "        case WeekdayFormat.standaloneNarrow:\n          weekDay = localeDate.dateSymbols.STANDALONENARROWWEEKDAYS[i];\n          break;\n"
          if marker in s:
            p.write_text(s.replace(marker, replacement))
            print('Patched lib/src/weekday_row.dart')
          else:
            print('Marker not found — already patched or file changed; skipping.')
          PY

      - name: Apply dart format
        run: dart format .

      - name: Re-run analyzer (informational)
        run: flutter analyze || true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git add -A
          git commit -m "style: apply dart fix and remove unreachable default"
          git push origin HEAD
